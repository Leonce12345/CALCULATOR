<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <style>
      body{align-items: center;
    background-color: black;} 
     
      .buttons{background-color: black;
        justify-content: center;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        padding: 22px;
        align-items: center;
    }
    .buttons input{ height: 50px;
    width: 50px;
font-size: 18px;
font-weight: bolder ;
border-radius: 50px;
background-color: rgb(12, 10, 17);
color: white;
text-align: center;
align-items: center;
 box-shadow: rgba(1,1, 35%, rgba(250,250,50%))}

 #display{width: 100%;
height:60px;
border-radius: 20px;
text-align: right;
font-size: 24px;
box-sizing: border-box;
padding: 10px;
align-items: center;}


    </style>
</head>
<body>
    <p style="color: white;text-align: center; ">calculator empowered by Mc Leonce @2026</p>
   <div class="display">
    <input type="text" id="display" readonly>
   </div> 
   <div class="buttons">
    <input type="button" value="1" onclick="display.value += 1">
    <input type="button" value="2" onclick="display.value += 2">
    <input type="button" value="3" onclick="display.value += 3">
    <input type="button" value="4" onclick="display.value += 4">
    <input type="button" value="5" onclick="display.value += 5">
    <input type="button" value="6" onclick="display.value += 6">
    <input type="button" value="7" onclick="display.value += 7">
    <input type="button" value="8" onclick="display.value += 8">
    <input type="button" value="9" onclick="display.value += 9">
    <input type="button" value="0" onclick="display.value += 0">
    <input type="button" value="." onclick="display.value += '.' ">

    <input type="button" value="+" onclick="display.value += '+' ">
    <input type="button" value="-" onclick="display.value += '-' ">
    <input type="button" value="x" onclick="display.value += '*' ">
    <input type="button" value="÷" onclick="display.value += '/' ">

    <input type="button" value="π" onclick="display.value = 3.142">
    <input style="background-color:red;" type="button" value="C" onclick="display.value = '' ">
    <input style="background-color:green;" type="button" value="DEL" onclick="display.value = display.value.slice(0,-1)"> 
    <input style="background-color: gray;" type="button" value="√" onclick="display.value = Math.sqrt(display.value)">
    <input style="background-color: blue;" type="button" value="=" onclick="display.value = eval(display.value)">
   </div>
   <div style="color: white; text-align: center; background-color: grey; border-radius: 10px;">
    <P>SIMPLE CALCULATOR@2026</P></div>
</body>
</html>
